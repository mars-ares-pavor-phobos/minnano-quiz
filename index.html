<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Interactive Minna no Nihongo learning app with vocabulary, kana, kanji quizzes, grammar notes, and dictionary."
    />
    <meta name="theme-color" content="#c4736e" />
    <title>Minna no Nihongo Vocabulary Quiz</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&amp;family=Outfit:wght@300;400;500;600;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&amp;display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Fullscreen background image layer -->
    <div class="bg-image-layer" aria-hidden="true"></div>
    <div class="bg-image-overlay" aria-hidden="true"></div>

    <!-- Sakura petals background -->
    <div
      class="sakura-container"
      id="sakura-container"
      aria-hidden="true"
    ></div>
    <button
      type="button"
      class="sakura-toggle"
      id="sakura-toggle"
      title="Toggle petals"
      aria-label="Toggle sakura petals"
      aria-pressed="true"
    >
      <span class="sakura-emoji">🌸</span>
    </button>

    <div class="app-container">
      <header class="header">
        <div class="app-title" id="app-title">
          <span class="title-mark">日</span>
          Minna no Nihongo
        </div>
        <div class="header-right">
          <div class="header-user-info" id="header-user-info">
            <span class="header-user-name" id="header-user-name"></span>
          </div>
          <button
            type="button"
            class="header-icon-btn sound-btn"
            id="sound-toggle-btn"
            title="Sound"
            aria-label="Toggle sound effects"
            aria-pressed="true"
          >
            <span class="icon"
              ><svg viewBox="0 0 24 24">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
                <path d="M15.54 8.46a5 5 0 0 1 0 7.07" />
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14" /></svg
            ></span>
          </button>
          <button
            type="button"
            class="header-icon-btn music-btn"
            id="music-toggle-btn"
            title="Background Music"
            aria-label="Toggle background music"
            aria-pressed="false"
          >
            <span class="icon"
              ><svg viewBox="0 0 24 24">
                <path d="M9 18V5l12-2v13" />
                <circle cx="6" cy="18" r="3" />
                <circle cx="18" cy="16" r="3" />
                <line x1="2" y1="2" x2="22" y2="22" stroke-width="2.5" /></svg
            ></span>
          </button>
          <button
            type="button"
            class="header-icon-btn"
            id="leaderboard-btn"
            title="Leaderboard"
            aria-label="Open leaderboard"
          >
            <span class="icon"
              ><svg viewBox="0 0 24 24">
                <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5C7 4 7 7 7 7" />
                <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5C17 4 17 7 17 7" />
                <path d="M4 22h16" />
                <path
                  d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"
                />
                <path
                  d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"
                />
                <path d="M18 2H6v7a6 6 0 0 0 12 0V2Z" /></svg
            ></span>
          </button>
          <button
            type="button"
            class="header-icon-btn"
            id="dictionary-btn"
            title="Dictionary"
            aria-label="Open dictionary"
          >
            <span class="icon"
              ><svg viewBox="0 0 24 24">
                <path
                  d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"
                />
                <path d="M8 7h6" />
                <path d="M8 11h4" /></svg
            ></span>
          </button>
          <button
            type="button"
            class="theme-toggle"
            id="theme-toggle-btn"
            title="Theme"
            aria-label="Toggle theme"
            aria-pressed="false"
          >
            <span class="icon icon-moon"
              ><svg viewBox="0 0 24 24">
                <path
                  d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"
                /></svg
            ></span>
            <span class="icon icon-sun"
              ><svg viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="5" />
                <line x1="12" y1="1" x2="12" y2="3" />
                <line x1="12" y1="21" x2="12" y2="23" />
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                <line x1="1" y1="12" x2="3" y2="12" />
                <line x1="21" y1="12" x2="23" y2="12" />
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" /></svg
            ></span>
          </button>
          <div class="lang-switcher">
            <button type="button" class="lang-btn active" data-lang="ru">
              RU
            </button>
            <button type="button" class="lang-btn" data-lang="uz">UZ</button>
          </div>
          <button
            type="button"
            class="header-icon-btn"
            id="logout-btn"
            title="Logout"
            aria-label="Logout"
          >
            <span class="icon"
              ><svg viewBox="0 0 24 24">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                <polyline points="16 17 21 12 16 7" />
                <line x1="21" y1="12" x2="9" y2="12" /></svg
            ></span>
          </button>
        </div>
      </header>

      <!-- Auth Screen -->
      <div id="auth-screen" class="auth-screen">
        <div class="auth-card">
          <div class="auth-logo">
            <div class="auth-logo-icon">日</div>
            <div class="auth-logo-text">Minna no Nihongo</div>
          </div>
          <div class="auth-tabs">
            <button
              type="button"
              class="auth-tab active"
              id="tab-login"
              data-tab="login"
            >
              Войти
            </button>
            <button
              type="button"
              class="auth-tab"
              id="tab-register"
              data-tab="register"
            >
              Регистрация
            </button>
          </div>
          <div class="auth-form" id="auth-form">
            <div class="auth-field" id="field-name" style="display: none">
              <label id="auth-label-name" for="auth-name">Имя</label>
              <input
                type="text"
                id="auth-name"
                autocomplete="name"
                maxlength="80"
              />
            </div>
            <div class="auth-field">
              <label id="auth-label-email" for="auth-email">Email</label>
              <input
                type="email"
                id="auth-email"
                autocomplete="email"
                maxlength="254"
              />
            </div>
            <div class="auth-field">
              <label id="auth-label-password" for="auth-password">Пароль</label>
              <input
                type="password"
                id="auth-password"
                autocomplete="current-password"
                minlength="6"
                maxlength="128"
              />
            </div>
            <div
              class="auth-error"
              id="auth-error"
              role="alert"
              aria-live="polite"
            ></div>
            <button type="button" class="auth-submit-btn" id="auth-submit-btn">
              Войти
            </button>
          </div>
        </div>
      </div>

      <!-- Start Screen -->
      <div id="start-screen" class="start-screen">
        <h2 class="section-title" id="select-lesson-title">Выберите урок</h2>
        <div class="lesson-grid" id="lesson-grid"></div>
      </div>

      <!-- Quiz View -->
      <div id="quiz-view" class="quiz-container">
        <div class="quiz-progress-bar-wrap">
          <div
            class="quiz-progress-bar-fill"
            id="quiz-progress-bar"
            style="width: 0%"
          ></div>
        </div>
        <div class="score-display">
          <div class="score-item">
            <div class="score-label" id="label-q">Вопрос</div>
            <div class="score-value" id="progress-text">1 / 5</div>
          </div>
          <div class="score-item">
            <div class="score-label" id="label-score">Счет</div>
            <div class="score-value" id="current-score-display">0</div>
          </div>
        </div>
        <div class="question-card">
          <div class="question-number" id="lesson-indicator">Урок 1</div>
          <div class="japanese-word" id="word-display"></div>
        </div>
        <div class="options-container" id="options-container"></div>
        <button type="button" class="quiz-back-btn" id="quiz-back-btn">
          Назад
        </button>
      </div>

      <!-- Results View -->
      <div id="results-view" class="results-screen">
        <div class="results-card">
          <div class="result-header">
            <h2 class="results-title" id="results-title">Результаты</h2>
          </div>
          <div class="final-score" id="final-score">0%</div>
          <div class="final-score-label" id="final-score-label">
            Правильных ответов
          </div>
          <div class="mistakes-container" id="mistakes-block">
            <h3 class="mistakes-title" id="mistakes-title">
              <span class="icon"
                ><svg viewBox="0 0 24 24">
                  <circle cx="12" cy="12" r="10" />
                  <line x1="15" y1="9" x2="9" y2="15" />
                  <line x1="9" y1="9" x2="15" y2="15" /></svg
              ></span>
              Ваши ошибки:
            </h3>
            <div class="mistakes-list" id="mistakes-list"></div>
          </div>
          <button type="button" class="restart-btn" id="restart-btn">
            Главное меню
          </button>
        </div>
      </div>

      <!-- Leaderboard View -->
      <div id="leaderboard-screen" class="leaderboard-screen">
        <div class="leaderboard-card">
          <h2 class="leaderboard-title" id="leaderboard-title">
            <span class="icon"
              ><svg viewBox="0 0 24 24">
                <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5C7 4 7 7 7 7" />
                <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5C17 4 17 7 17 7" />
                <path d="M4 22h16" />
                <path
                  d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"
                />
                <path
                  d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"
                />
                <path d="M18 2H6v7a6 6 0 0 0 12 0V2Z" /></svg
            ></span>
            Рейтинг учеников
          </h2>
          <div class="leaderboard-list" id="leaderboard-list"></div>
        </div>
        <button
          type="button"
          class="leaderboard-back-btn"
          id="leaderboard-back-btn"
        >
          Назад
        </button>
      </div>

      <!-- Dictionary View -->
      <div id="dictionary-screen" class="dictionary-screen">
        <div class="dictionary-card">
          <h2 class="dictionary-title" id="dictionary-title">
            <span class="icon"
              ><svg viewBox="0 0 24 24">
                <path
                  d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"
                />
                <path d="M8 7h6" />
                <path d="M8 11h4" /></svg
            ></span>
            Словарь
          </h2>
          <div id="dictionary-breadcrumb" class="dict-breadcrumb"></div>
          <div id="dictionary-content"></div>
        </div>
        <button
          type="button"
          class="dictionary-back-btn"
          id="dictionary-back-btn"
        >
          Назад
        </button>
      </div>
    </div>

    <!-- Feedback Modal -->
    <div
      class="modal-overlay"
      id="feedback-modal"
      role="dialog"
      aria-modal="true"
      aria-hidden="true"
      aria-labelledby="feedback-status"
    >
      <div class="modal-content">
        <div class="result-header">
          <div class="result-icon" id="feedback-icon"></div>
          <h3 class="result-title" id="feedback-status">Верно!</h3>
        </div>
        <div class="example-section">
          <div class="example-label" id="correct-label">Правильный ответ</div>
          <div class="correct-answer-text">
            <span id="correct-answer-text">Answer</span>
          </div>
        </div>
        <div class="example-section">
          <div class="example-label" id="modal-example-label">Пример</div>
          <div class="example-jp" id="modal-example-jp"></div>
          <div class="example-translation" id="modal-example-trans"></div>
        </div>
        <div class="grammar-section">
          <div class="grammar-label" id="modal-grammar-label">
            <span class="icon"
              ><svg viewBox="0 0 24 24">
                <path
                  d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 1 1 7.072 0l-.548.547A3.374 3.374 0 0 0 14 18.469V19a2 2 0 1 1-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"
                /></svg
            ></span>
            Грамматика
          </div>
          <div class="grammar-text" id="modal-grammar-text"></div>
        </div>
        <button type="button" class="next-btn" id="modal-next-btn" disabled>
          <span id="btn-text">Далее</span>
          <div class="timer-bar" id="timer-bar" style="width: 0%"></div>
        </button>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
